kind = "mobile"
previewPath = "/"
title = "Budget Tracker"
version = "1.0.0"
id = "artifacts/budget-tracker"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 25099

[services.development]
run = "pnpm --filter @workspace/budget-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/budget-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/budget-tracker", "run", "serve" ]

[services.env]
PORT = "25099"
BASE_PATH = "/"
